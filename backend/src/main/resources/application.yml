server:
  port: 8080

spring:
  application:
    name: datastory-ai-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/datastory_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 80MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-key-to-at-least-32-characters}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

github-models:
  chat-api-key: ${GITHUB_CHAT_API_KEY:}
  embedding-api-key: ${GITHUB_EMBEDDING_API_KEY:}
  chat-model: ${GITHUB_CHAT_MODEL:openai/gpt-4.1-mini}
  embedding-model: ${GITHUB_EMBEDDING_MODEL:openai/text-embedding-3-small}
